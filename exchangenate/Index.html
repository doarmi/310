<style>
  /* ============================================
     공통 변수 (라이트모드 기본값)
     ============================================ */
  :root{
    --배경색1: #eef4fb;         /* Ice blue */
    --배경색2: #f7f9fc;         /* Light gray */
    --배경색3: #e8f1ff;
    --글자색: #1c1c1e;
    --보조글자색: #6e6e73;
    --카드배경: rgba(255,255,255,0.55);
    --카드테두리: rgba(255,255,255,0.6);
    --오브배경: rgba(255,255,255,0.45);
    --오브테두리: rgba(255,255,255,0.7);
    --프라이머리: #34C759;
    --블루글로우: rgba(88,150,255,0.35);
    --그림자색: rgba(31,58,102,0.15);
    --블러강도: 26px;
    --전환시간: 0.5s;
  }

  /* Dark mode variables (applied when body.dark class is added) */
  body.dark{
    --배경색1: #0b1224;         /* Deep navy */
    --배경색2: #12172a;         /* Dark gray */
    --배경색3: #101a30;
    --글자색: #f2f2f7;
    --보조글자색: #9a9ab0;
    --카드배경: rgba(30,36,58,0.55);
    --카드테두리: rgba(255,255,255,0.12);
    --오브배경: rgba(255,255,255,0.06);
    --오브테두리: rgba(120,160,255,0.35);
    --프라이머리: #34C759;
    --블루글로우: rgba(90,150,255,0.55);
    --그림자색: rgba(0,0,0,0.45);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body{
    margin:0;
    min-height:100vh;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Malgun Gothic", sans-serif;
    color: var(--글자색);
    background: radial-gradient(circle at 20% 10%, var(--배경색3), var(--배경색1) 60%, var(--배경색2));
    transition: background var(--전환시간) ease, color var(--전환시간) ease;
    display:flex;
    justify-content:center;
    padding: 24px 14px 60px;
  }

  .앱컨테이너{
    width:100%;
    max-width: 480px;
    text-align:center; /* Center align everything */
  }

  /* ============================================
     상단 영역
     ============================================ */
  .상단영역{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    margin-bottom: 22px;
    position:relative;
  }
  .로고이미지{
    width: 64px; height: 64px;
    border-radius: 18px;
    filter: drop-shadow(0 6px 14px var(--그림자색));
  }
  .앱제목{ font-size: 26px; font-weight:800; letter-spacing:-0.5px; margin:0; }
  .서브타이틀{ font-size: 13px; color: var(--보조글자색); margin:0; }

  /* Dark mode toggle (iOS style switch) */
  .모드토글{
    position:absolute;
    top:0; right:0;
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    user-select:none;
  }
  .토글아이콘{ font-size:14px; }
  .토글스위치{
    width:48px; height:28px;
    border-radius: 999px;
    background: rgba(120,120,128,0.28);
    position:relative;
    transition: background var(--전환시간) ease;
  }
  body.dark .토글스위치{ background: var(--프라이머리); }
  .토글손잡이{
    position:absolute;
    top:2px; left:2px;
    width:24px; height:24px;
    border-radius:50%;
    background:#fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    transition: transform 0.35s cubic-bezier(.4,1.6,.4,1);
  }
  body.dark .토글손잡이{ transform: translateX(20px); }

  /* ============================================
     글래스 카드 공통 스타일
     ============================================ */
  .글래스카드{
    background: var(--카드배경);
    border: 1px solid var(--카드테두리);
    border-radius: 28px;
    backdrop-filter: blur(var(--블러강도));
    -webkit-backdrop-filter: blur(var(--블러강도));
    box-shadow: 0 12px 30px var(--그림자색);
    padding: 20px;
    margin-bottom: 18px;
    transition: background var(--전환시간) ease, border-color var(--전환시간) ease;
  }

  /* ============================================
     설정 영역
     ============================================ */
  .설정라벨{
    font-size: 13px;
    font-weight:700;
    color: var(--보조글자색);
    text-align:left;
    margin: 4px 2px 8px;
  }

  .게임수선택{
    width:100%;
    padding: 12px 16px;
    border-radius: 999px;
    border: 1px solid var(--카드테두리);
    background: var(--오브배경);
    color: var(--글자색);
    font-size:15px;
    font-weight:600;
    text-align:center;
    appearance:none;
    -webkit-appearance:none;
    outline:none;
    margin-bottom: 16px;
  }

  .제외입력창{
    width:100%;
    padding: 12px 16px;
    border-radius: 999px;
    border: 1px solid var(--카드테두리);
    background: var(--오브배경);
    color: var(--글자색);
    font-size:14px;
    text-align:center;
    outline:none;
    margin-bottom: 14px;
  }
  .제외입력창::placeholder{ color: var(--보조글자색); }

  /* Recently excluded numbers display bar */
  .최근제외표시{
    min-height: 18px;
    font-size: 12px;
    color: var(--프라이머리);
    font-weight:700;
    margin-bottom: 10px;
    word-break: break-all;
  }

  /* Grid that displays 1-45 checkboxes as Glass Chips */
  .제외그리드{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
    gap: 8px;
    margin-bottom: 10px;
  }
  .제외칩{
    aspect-ratio: 1/1;
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 13px;
    font-weight:700;
    background: var(--오브배경);
    border: 1px solid var(--오브테두리);
    color: var(--글자색);
    cursor:pointer;
    transition: transform 0.2s ease, box-shadow 0.25s ease, background 0.25s ease, color 0.25s ease;
  }
  .제외칩:active{ transform: scale(0.9); }
  .제외칩.선택됨{
    background: var(--프라이머리);
    color:#fff;
    border-color: var(--프라이머리);
    transform: scale(1.1);
    box-shadow: 0 0 14px var(--블루글로우);
  }

  .경고문구{
    font-size:12px;
    color:#ff453a;
    font-weight:700;
    margin: 4px 0 6px;
    display:none;
  }
  .경고문구.보임{ display:block; }

  /* ============================================
     버튼 영역 (iOS 캡슐형 버튼)
     ============================================ */
  .버튼영역{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom: 18px;
  }

  .캡슐버튼{
    flex: 1 1 auto;
    min-width: 130px;
    padding: 14px 18px;
    border:none;
    border-radius: 999px;
    font-size: 15px;
    font-weight:700;
    cursor:pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    -webkit-user-select:none;
    user-select:none;
  }
  .캡슐버튼:active{ transform: scale(0.97); }

  .버튼-primary{
    background: var(--프라이머리);
    color:#fff;
    box-shadow: 0 8px 20px rgba(52,199,89,0.35);
  }
  .버튼-secondary{
    background: var(--오브배경);
    color: var(--글자색);
    border: 1px solid var(--카드테두리);
  }
  .캡슐버튼:disabled{
    opacity:0.4;
    cursor:not-allowed;
    transform:none;
  }

  /* ============================================
     결과 영역
     ============================================ */
  .결과영역{ min-height: 60px; }

  .로딩표시{
    display:none;
    flex-direction:column;
    align-items:center;
    gap:10px;
    padding: 30px 10px;
    color: var(--보조글자색);
    font-weight:600;
    font-size:14px;
  }
  .로딩표시.보임{ display:flex; }
  .로딩스피너{
    width:34px; height:34px;
    border-radius:50%;
    border: 3px solid rgba(120,120,128,0.25);
    border-top-color: var(--프라이머리);
    animation: 스핀 0.8s linear infinite;
  }
  @keyframes 스핀{ to{ transform: rotate(360deg); } }

  .게임보드{
    opacity:0;
    transform: translateY(20px);
    animation: 카드등장 0.5s ease forwards;
  }
  @keyframes 카드등장{
    to{ opacity:1; transform: translateY(0); }
  }

  .게임보드헤더{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 12px;
  }
  .게임번호라벨{
    font-size: 13px;
    font-weight:800;
    color: var(--보조글자색);
    background: var(--오브배경);
    padding: 4px 12px;
    border-radius: 999px;
  }
  .즐겨찾기버튼{
    background:none;
    border:none;
    font-size: 20px;
    cursor:pointer;
    transition: transform 0.25s ease;
  }
  .즐겨찾기버튼.애니메이션{ animation: 하트펄스 0.4s ease; }
  @keyframes 하트펄스{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.3); }
    100%{ transform: scale(1); }
  }

  .번호목록{
    display:flex;
    flex-wrap: wrap;
    justify-content:center;
    gap: 10px;
  }

  /* Glass Orb number ball */
  .번호오브{
    width: 52px; height:52px;
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 17px;
    font-weight:800;
    color: var(--글자색);
    background: var(--오브배경);
    border: 1px solid var(--오브테두리);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 6px 14px var(--그림자색), inset 0 1px 2px rgba(255,255,255,0.6);
    position:relative;
    overflow:hidden;
    opacity:0;
    transform: scale(0.8);
    animation: 오브등장 0.45s ease forwards, 오브플로팅 3s ease-in-out infinite;
    animation-delay: var(--지연시간), calc(var(--지연시간) + 0.5s);
    cursor:pointer;
    transition: box-shadow 0.25s ease;
  }
  .번호오브:active{ transform: scale(0.95) !important; }
  .번호오브::after{
    /* Subtle reflection highlight */
    content:"";
    position:absolute;
    top:-40%; left:-60%;
    width:60%; height:180%;
    background: linear-gradient(120deg, rgba(255,255,255,0.55), transparent 60%);
    transform: rotate(20deg);
    pointer-events:none;
  }

  @keyframes 오브등장{
    to{ opacity:1; transform: scale(1); }
  }
  @keyframes 오브플로팅{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-4px); }
  }

  /* Accent color per number range (lotto-style colors) */
  .번호오브[data-구간="1"]{ box-shadow: 0 6px 14px var(--그림자색), inset 0 1px 2px rgba(255,255,255,0.6), 0 0 0 2px rgba(255,201,60,0.5) inset; }
  .번호오브[data-구간="2"]{ box-shadow: 0 6px 14px var(--그림자색), inset 0 1px 2px rgba(255,255,255,0.6), 0 0 0 2px rgba(93,173,255,0.5) inset; }
  .번호오브[data-구간="3"]{ box-shadow: 0 6px 14px var(--그림자색), inset 0 1px 2px rgba(255,255,255,0.6), 0 0 0 2px rgba(255,99,99,0.5) inset; }
  .번호오브[data-구간="4"]{ box-shadow: 0 6px 14px var(--그림자색), inset 0 1px 2px rgba(255,255,255,0.6), 0 0 0 2px rgba(150,150,150,0.5) inset; }
  .번호오브[data-구간="5"]{ box-shadow: 0 6px 14px var(--그림자색), inset 0 1px 2px rgba(255,255,255,0.6), 0 0 0 2px rgba(120,220,140,0.5) inset; }

  /* ============================================
     안내 문구
     ============================================ */
  .안내문구{
    font-size: 11.5px;
    color: var(--보조글자색);
    line-height:1.5;
    margin-top: 20px;
    padding: 0 8px;
  }

  /* ============================================
     Toast 알림 (Dynamic Island 느낌)
     ============================================ */
  .토스트{
    position: fixed;
    left: 50%;
    bottom: 30px;
    transform: translate(-50%, 20px);
    background: rgba(28,28,30,0.85);
    color:#fff;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 14px;
    font-weight:600;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    opacity:0;
    pointer-events:none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 999;
    white-space:nowrap;
  }
  .토스트.보임{
    opacity:1;
    transform: translate(-50%, 0);
  }

  /* iOS-style context menu shown on long press */
  .컨텍스트메뉴{
    position: fixed;
    background: var(--카드배경);
    border: 1px solid var(--카드테두리);
    border-radius: 16px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 10px 30px var(--그림자색);
    overflow:hidden;
    z-index: 1000;
    display:none;
    min-width: 170px;
  }
  .컨텍스트메뉴.보임{ display:block; }
  .컨텍스트메뉴 button{
    width:100%;
    padding: 12px 16px;
    background:none;
    border:none;
    border-bottom: 1px solid var(--카드테두리);
    color: var(--글자색);
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    text-align:left;
  }
  .컨텍스트메뉴 button:last-child{ border-bottom:none; }

  @media (max-width: 360px){
    .번호오브{ width:46px; height:46px; font-size:15px; }
    .캡슐버튼{ min-width: 100%; }
  }
</style>
</head>

      <option value="3">3게임</option>
      <option value="5">5게임</option>
      <option value="10">10게임</option>
    </select>

    <div class="설정라벨">제외 번호 입력 (예: 4, 13, 44)</div>
    <input type="text" id="제외입력창" class="제외입력창" placeholder="쉼표로 구분하여 입력하세요">

    <div class="최근제외표시" id="최근제외표시">선택된 제외 번호가 없습니다.</div>

    <div class="설정라벨">1 ~ 45 번호에서 제외할 번호를 선택하세요</div>
    <div class="제외그리드" id="제외그리드"></div>

    <div class="경고문구" id="경고문구">⚠️ 제외 번호가 40개 이상이면 추첨할 수 없습니다.</div>
  </div>

  <!-- ============ Buttons Section ============ -->
  <div class="버튼영역">
    <button class="캡슐버튼 버튼-primary" id="추첨버튼">🎲 번호 추첨하기</button>
    <button class="캡슐버튼 버튼-secondary" id="복사버튼">📋 번호 복사</button>
    <button class="캡슐버튼 버튼-secondary" id="제외초기화버튼">🔄 제외 번호 초기화</button>
  </div>

  <!-- ============ Results Section ============ -->
  <div class="결과영역" id="결과영역">
    <div class="로딩표시" id="로딩표시">
      <div class="로딩스피너"></div>
      <div>Generating Lucky Numbers...<br>행운 번호를 연구 중입니다...</div>
    </div>
    <div id="게임보드컨테이너"></div>
  </div>

  <!-- ============ Disclaimer Text ============ -->
  <p class="안내문구">
    본 앱은 재미와 편의를 위한 랜덤 번호 생성 서비스이며,<br>
    실제 당첨을 보장하지 않습니다.
  </p>
</div>

<!-- Toast notification -->
<div class="토스트" id="토스트"></div>

<!-- Context menu shown on long press -->
<div class="컨텍스트메뉴" id="컨텍스트메뉴">
  <button id="메뉴복사">📋 번호 복사</button>
  <button id="메뉴제외추가">🚫 제외 번호 추가</button>
</div>

<script>
  // ============================================
  // Global state variables
  // ============================================
  var 선택된제외번호 = new Set();   // excluded numbers selected via checkboxes
  var 마지막생성결과 = [];          // numbers from the most recently drawn games (used for copying)
  var 즐겨찾기상태 = {};            // favorite status per game index
  var 컨텍스트메뉴대상번호 = null;   // the value of the long-pressed number orb

  // ============================================
  // Initialization: runs when the page loads
  // ============================================
  window.addEventListener('DOMContentLoaded', function(){
    저장된모드적용();
    제외그리드생성();
    이벤트등록();
  });

  // --------------------------------------------
  // Load the saved dark/light mode from localStorage and apply it
  // --------------------------------------------
  function 저장된모드적용(){
    var 저장된모드 = localStorage.getItem('luckyLab645_theme');
    if(저장된모드 === 'dark'){
      document.body.classList.add('dark');
      document.querySelector('.토글아이콘').textContent = '🌙';
    }
  }

  // --------------------------------------------
  // Renders numbers 1-45 as checkbox-style Glass Chips
  // --------------------------------------------
  function 제외그리드생성(){
    var 그리드 = document.getElementById('제외그리드');
    var html = '';
    for(var 번호 = 1; 번호 <= 45; 번호++){
      html += '<div class="제외칩" data-번호="' + 번호 + '">' + 번호 + '</div>';
    }
    그리드.innerHTML = html;
  }

  // --------------------------------------------
  // Register all event listeners at once
  // --------------------------------------------
  function 이벤트등록(){
    // Dark mode toggle click
    document.getElementById('모드토글버튼').addEventListener('click', 모드전환);

    // Exclude-number chip click - using event delegation
    document.getElementById('제외그리드').addEventListener('click', function(e){
      var 칩 = e.target.closest('.제외칩');
      if(!칩) return;
      var 번호 = parseInt(칩.dataset.번호, 10);
      칩클릭처리(번호, 칩);
    });

    // When typing into the exclude-number input field
    document.getElementById('제외입력창').addEventListener('input', 최근제외표시갱신);

    // Buttons
    document.getElementById('추첨버튼').addEventListener('click', 번호추첨시작);
    document.getElementById('복사버튼').addEventListener('click', 번호복사);
    document.getElementById('제외초기화버튼').addEventListener('click', 제외번호초기화);

    // Context menu items
    document.getElementById('메뉴복사').addEventListener('click', function(){
      단일번호복사(컨텍스트메뉴대상번호);
      컨텍스트메뉴닫기();
    });
    document.getElementById('메뉴제외추가').addEventListener('click', function(){
      var 칩 = document.querySelector('.제외칩[data-번호="' + 컨텍스트메뉴대상번호 + '"]');
      if(칩) 칩클릭처리(컨텍스트메뉴대상번호, 칩, true);
      컨텍스트메뉴닫기();
    });

    // Close the context menu when clicking anywhere on screen
    document.addEventListener('click', function(e){
      if(!e.target.closest('.컨텍스트메뉴')) 컨텍스트메뉴닫기();
    });
  }

  // --------------------------------------------
  // Toggle between dark mode and light mode
  // --------------------------------------------
  function 모드전환(){
    var 다크모드여부 = document.body.classList.toggle('dark');
    document.querySelector('.토글아이콘').textContent = 다크모드여부 ? '🌙' : '☀️';
    // Save the selected mode to localStorage so it persists on next visit
    localStorage.setItem('luckyLab645_theme', 다크모드여부 ? 'dark' : 'light');
  }

  // --------------------------------------------
  // Handles a click on an exclude-number chip (checkbox)
  // --------------------------------------------
  function 칩클릭처리(번호, 칩엘리먼트){
    if(선택된제외번호.has(번호)){
      선택된제외번호.delete(번호);
      칩엘리먼트.classList.remove('선택됨');
    } else {
      선택된제외번호.add(번호);
      칩엘리먼트.classList.add('선택됨');
    }
    최근제외표시갱신();
  }

  // --------------------------------------------
  // Combine the input field text with the checkbox selections and
  // update the "recently excluded numbers" area and warning text
  // --------------------------------------------
  function 최근제외표시갱신(){
    var 전체제외번호 = 전체제외번호가져오기();
    var 표시영역 = document.getElementById('최근제외표시');
    var 경고문구 = document.getElementById('경고문구');

    if(전체제외번호.length === 0){
      표시영역.textContent = '선택된 제외 번호가 없습니다.';
    } else {
      표시영역.textContent = '최근 제외 번호: ' + 전체제외번호.join(', ');
    }

    // Show a warning and disable the draw button if 40+ numbers are excluded
    var 추첨버튼 = document.getElementById('추첨버튼');
    if(전체제외번호.length >= 40){
      경고문구.classList.add('보임');
      추첨버튼.disabled = true;
    } else {
      경고문구.classList.remove('보임');
      추첨버튼.disabled = false;
    }
  }

  // --------------------------------------------
  // Combine the input field string with the checkbox selections
  // and return a deduplicated array of excluded numbers (range 1-45)
  // --------------------------------------------
  function 전체제외번호가져오기(){
    var 결과집합 = new Set(선택된제외번호);
    var 입력값 = document.getElementById('제외입력창').value;

    if(입력값.trim() !== ''){
      입력값.split(',').forEach(function(조각){
        var 숫자 = parseInt(조각.trim(), 10);
        if(!isNaN(숫자) && 숫자 >= 1 && 숫자 <= 45){
          결과집합.add(숫자);
        }
      });
    }
    return Array.from(결과집합);
  }

  // --------------------------------------------
  // Reset all excluded numbers
  // --------------------------------------------
  function 제외번호초기화(){
    선택된제외번호.clear();
    document.getElementById('제외입력창').value = '';
    document.querySelectorAll('.제외칩.선택됨').forEach(function(칩){
      칩.classList.remove('선택됨');
    });
    최근제외표시갱신();
    토스트표시('🔄 제외 번호가 초기화되었습니다.');
  }

  // --------------------------------------------
  // [Core feature] Start the number draw
  // Button click -> show loading -> show results after 0.8-1s
  // --------------------------------------------
  function 번호추첨시작(){
    var 제외번호목록 = 전체제외번호가져오기();

    if(제외번호목록.length >= 40){
      토스트표시('⚠️ 제외 번호가 너무 많아 추첨할 수 없습니다.');
      return;
    }

    // Safety check: can't draw if fewer than 6 numbers are available
    var 후보풀 = [];
    for(var i = 1; i <= 45; i++){
      if(제외번호목록.indexOf(i) === -1) 후보풀.push(i);
    }
    if(후보풀.length < 6){
      토스트표시('⚠️ 선택 가능한 번호가 부족합니다.');
      return;
    }

    var 게임수 = parseInt(document.getElementById('게임수선택').value, 10);

    // Turn on the loading indicator and blur the existing results
    var 로딩표시 = document.getElementById('로딩표시');
    var 보드컨테이너 = document.getElementById('게임보드컨테이너');
    로딩표시.classList.add('보임');
    보드컨테이너.style.opacity = '0.3';
    보드컨테이너.style.filter = 'blur(6px)';
    document.getElementById('추첨버튼').disabled = true;

    // Calculate and show results after a random 0.8-1s delay (per requirements)
    var 지연시간 = 800 + Math.random() * 200;

    setTimeout(function(){
      var 전체게임결과 = [];
      for(var g = 0; g < 게임수; g++){
        전체게임결과.push(게임번호생성(후보풀));
      }
      마지막생성결과 = 전체게임결과;
      즐겨찾기상태 = {};

      로딩표시.classList.remove('보임');
      보드컨테이너.style.opacity = '1';
      보드컨테이너.style.filter = 'none';
      document.getElementById('추첨버튼').disabled = false;

      결과화면그리기(전체게임결과);
    }, 지연시간);
  }

  // --------------------------------------------
  // Draw 6 unique numbers from the candidate pool and return them sorted ascending
  // --------------------------------------------
  function 게임번호생성(후보풀){
    var 복사본 = 후보풀.slice(); // copy to avoid mutating the original array
    var 뽑힌번호 = [];

    // Randomly extract 6 numbers using the Fisher-Yates method
    for(var i = 0; i < 6; i++){
      var 랜덤인덱스 = Math.floor(Math.random() * 복사본.length);
      뽑힌번호.push(복사본[랜덤인덱스]);
      복사본.splice(랜덤인덱스, 1);
    }

    // Auto-sort in ascending order
    뽑힌번호.sort(function(a, b){ return a - b; });
    return 뽑힌번호;
  }

  // --------------------------------------------
  // Assigns a different accent color depending on the number's range
  // (1-10, 11-20, 21-30, 31-40, 41-45)
  // --------------------------------------------
  function 번호구간구하기(번호){
    if(번호 <= 10) return 1;
    if(번호 <= 20) return 2;
    if(번호 <= 30) return 3;
    if(번호 <= 40) return 4;
    return 5;
  }

  // --------------------------------------------
  // Renders the draw results as Glass Board cards + Glass Orb numbers
  // --------------------------------------------
  function 결과화면그리기(전체게임결과){
    var 컨테이너 = document.getElementById('게임보드컨테이너');
    var html = '';

    전체게임결과.forEach(function(번호배열, 게임인덱스){
      html += '<div class="글래스카드 게임보드">';
      html += '  <div class="게임보드헤더">';
      html += '    <span class="게임번호라벨">GAME ' + (게임인덱스 + 1) + '</span>';
      html += '    <button class="즐겨찾기버튼" data-게임인덱스="' + 게임인덱스 + '" onclick="즐겨찾기토글(' + 게임인덱스 + ')">♡</button>';
      html += '  </div>';
      html += '  <div class="번호목록">';

      번호배열.forEach(function(번호, 순번){
        var 지연 = (순번 * 0.12) + 's';
        var 구간 = 번호구간구하기(번호);
        html += '<div class="번호오브" data-구간="' + 구간 + '" style="--지연시간:' + 지연 + '" ';
        html += '     onclick="단일번호복사(' + 번호 + ')">' + 번호 + '</div>';
      });

      html += '  </div>';
      html += '</div>';
    });

    컨테이너.innerHTML = html;

    // Register long-press events on each number orb
    롱프레스이벤트등록();
  }

  // --------------------------------------------
  // Long-pressing a number orb shows an iOS-style context menu
  // --------------------------------------------
  function 롱프레스이벤트등록(){
    var 오브목록 = document.querySelectorAll('.번호오브');
    오브목록.forEach(function(오브){
      var 타이머 = null;

      var 시작 = function(e){
        타이머 = setTimeout(function(){
          컨텍스트메뉴대상번호 = parseInt(오브.textContent, 10);
          var 위치 = 오브.getBoundingClientRect();
          컨텍스트메뉴열기(위치.left, 위치.top);
        }, 500); // treated as a long press after 0.5s or more
      };
      var 종료 = function(){ clearTimeout(타이머); };

      오브.addEventListener('mousedown', 시작);
      오브.addEventListener('touchstart', 시작);
      오브.addEventListener('mouseup', 종료);
      오브.addEventListener('mouseleave', 종료);
      오브.addEventListener('touchend', 종료);
    });
  }

  function 컨텍스트메뉴열기(x, y){
    var 메뉴 = document.getElementById('컨텍스트메뉴');
    메뉴.style.left = Math.min(x, window.innerWidth - 190) + 'px';
    메뉴.style.top = (y + 40) + 'px';
    메뉴.classList.add('보임');
  }
  function 컨텍스트메뉴닫기(){
    document.getElementById('컨텍스트메뉴').classList.remove('보임');
  }

  // --------------------------------------------
  // Favorite heart icon click -> save to the server (Google Sheets)
  // --------------------------------------------
  function 즐겨찾기토글(게임인덱스){
    var 하트버튼 = document.querySelector('.즐겨찾기버튼[data-게임인덱스="' + 게임인덱스 + '"]');
    var 번호배열 = 마지막생성결과[게임인덱스];

    if(즐겨찾기상태[게임인덱스]){
      // If already saved: just reset the visual state (prevents duplicate saves)
      즐겨찾기상태[게임인덱스] = false;
      하트버튼.textContent = '♡';
      return;
    }

    // Fill the heart icon and play the pulse animation
    하트버튼.textContent = '♥';
    하트버튼.classList.add('애니메이션');
    setTimeout(function(){ 하트버튼.classList.remove('애니메이션'); }, 400);
    즐겨찾기상태[게임인덱스] = true;

    // Call the Google Apps Script server function (Code.gs) to save to the sheet
    google.script.run
      .withSuccessHandler(function(응답){
        if(응답 && 응답.성공){
          토스트표시('✨ 즐겨찾기에 저장되었습니다.');
        } else {
          토스트표시('⚠️ 저장에 실패했습니다.');
        }
      })
      .withFailureHandler(function(){
        토스트표시('⚠️ 저장 중 오류가 발생했습니다.');
      })
      .즐겨찾기저장(게임인덱스 + 1, 번호배열);
  }

  // --------------------------------------------
  // Copy all numbers (every game)
  // --------------------------------------------
  function 번호복사(){
    if(마지막생성결과.length === 0){
      토스트표시('먼저 번호를 추첨해주세요!');
      return;
    }
    var 텍스트 = 마지막생성결과.map(function(배열, i){
      return 'GAME ' + (i + 1) + ' : ' + 배열.join(', ');
    }).join('\n');

    클립보드에복사(텍스트);
    토스트표시('📋 번호 복사 완료!');
  }

  // --------------------------------------------
  // Copy a single number (used by click or the long-press menu)
  // --------------------------------------------
  function 단일번호복사(번호){
    클립보드에복사(String(번호));
    토스트표시('📋 ' + 번호 + '번 복사 완료!');
  }

  // --------------------------------------------
  // Perform the clipboard copy (supports both old and new browsers)
  // --------------------------------------------
  function 클립보드에복사(텍스트){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(텍스트);
    } else {
      var 임시입력창 = document.createElement('textarea');
      임시입력창.value = 텍스트;
      document.body.appendChild(임시입력창);
      임시입력창.select();
      document.execCommand('copy');
      document.body.removeChild(임시입력창);
    }
  }

  // --------------------------------------------
  // Show a toast notification sliding up from the bottom (Dynamic Island feel)
  // --------------------------------------------
  var 토스트타이머 = null;
  function 토스트표시(메시지){
    var 토스트엘리먼트 = document.getElementById('토스트');
    토스트엘리먼트.textContent = 메시지;
    토스트엘리먼트.classList.add('보임');

    clearTimeout(토스트타이머);
    // Automatically disappears after 2 seconds
    토스트타이머 = setTimeout(function(){
      토스트엘리먼트.classList.remove('보임');
    }, 2000);
  }
</script>
</body>
</html>
