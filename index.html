<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass MBTI Test</title>

  <!-- Font Awesome 아이콘 CDN -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, #ffffff 0, transparent 28%),
        linear-gradient(135deg, #dbeafe, #ede9fe, #fce7f3);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 820px;
      padding: 32px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 24px 60px rgba(79, 70, 229, 0.16);
    }

    .title {
      text-align: center;
      margin-bottom: 22px;
    }

    .title i {
      color: #6366f1;
      margin-right: 8px;
    }

    .title h1 {
      font-size: 32px;
      color: #4338ca;
      margin-bottom: 8px;
    }

    .title p {
      color: #6b7280;
      font-size: 15px;
    }

    .progress-wrap {
      margin-bottom: 24px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 8px;
    }

    .progress {
      height: 12px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 10%;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      border-radius: 999px;
      transition: width 0.3s;
    }

    .question-card {
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 18px;
      box-shadow: 0 10px 24px rgba(99, 102, 241, 0.08);
    }

    .question-card h2 {
      font-size: 18px;
      margin-bottom: 14px;
      color: #111827;
      line-height: 1.45;
    }

    .scale {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .scale label {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(99, 102, 241, 0.12);
      border-radius: 16px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      font-size: 13px;
      color: #6b7280;
    }

    .scale input {
      display: none;
    }

    .scale label:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(99, 102, 241, 0.14);
    }

    .scale input:checked + span {
      color: #4f46e5;
      font-weight: 800;
    }

    .scale label:has(input:checked) {
      background: #eef2ff;
      border-color: #818cf8;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 15px 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-sub {
      background: rgba(255, 255, 255, 0.75);
      color: #4f46e5;
    }

    .btn-main {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      box-shadow: 0 12px 24px rgba(99, 102, 241, 0.25);
    }

    button:hover {
      transform: translateY(-2px);
    }

    .result {
      display: none;
      text-align: center;
    }

    .result-icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 18px;
      border-radius: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(255, 255, 255, 0.74);
      color: #6366f1;
      font-size: 46px;
      box-shadow: 0 16px 32px rgba(99, 102, 241, 0.18);
    }

    .result h2 {
      font-size: 42px;
      color: #4338ca;
      margin-bottom: 12px;
    }

    .result-desc {
      max-width: 560px;
      margin: 0 auto;
      color: #4b5563;
      line-height: 1.7;
      font-size: 17px;
    }

    .feedback {
      margin: 26px auto 0;
      max-width: 420px;
      text-align: left;
      background: rgba(255, 255, 255, 0.62);
      padding: 20px;
      border-radius: 22px;
    }

    .feedback h3 {
      color: #374151;
      margin-bottom: 12px;
      font-size: 17px;
    }

    .feedback label {
      display: block;
      margin: 10px 0;
      color: #4b5563;
    }

    .restart {
      margin-top: 22px;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
        align-items: flex-start;
      }

      .app {
        padding: 22px;
        border-radius: 26px;
      }

      .title h1 {
        font-size: 26px;
      }

      .scale {
        grid-template-columns: 1fr;
      }

      .scale label {
        font-size: 14px;
      }

      .nav {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .result h2 {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section id="testArea">
      <div class="title">
        <h1><i class="fa-solid fa-brain"></i>MBTI Mini Test</h1>
        <p>20문항으로 가볍게 알아보는 성향 테스트</p>
      </div>

      <div class="progress-wrap">
        <div class="progress-info">
          <span id="pageText">1 / 10</span>
          <span id="percentText">10%</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div id="questionBox"></div>

      <div class="nav">
        <button class="btn-sub" id="prevBtn">이전</button>
        <button class="btn-main" id="nextBtn">다음</button>
      </div>
    </section>

    <section class="result" id="resultArea">
      <div class="result-icon" id="resultIcon">
        <i class="fa-solid fa-user-astronaut"></i>
      </div>
      <h2 id="resultType">ISTP</h2>
      <p class="result-desc" id="resultDesc"></p>

      <div class="feedback">
        <h3>결과가 어땠나요?</h3>
        <label><input type="checkbox" /> 나온 결과가 비슷하다</label>
        <label><input type="checkbox" /> 대체로 맞다</label>
        <label><input type="checkbox" /> 다르다</label>
      </div>

      <button class="btn-main restart" id="restartBtn">다시 검사하기</button>
    </section>
  </main>

  <script>
    const questions = [
      { text: "사람들과 함께 있을 때 에너지가 채워지는 편이다.", axis: "EI" },
      { text: "혼자만의 시간이 있어야 컨디션이 회복된다.", axis: "IE" },
      { text: "아이디어보다 실제 경험과 사실을 더 신뢰한다.", axis: "SN" },
      { text: "눈앞의 현실보다 가능성과 의미를 먼저 생각한다.", axis: "NS" },
      { text: "결정할 때 감정보다 논리와 기준을 우선한다.", axis: "TF" },
      { text: "결정할 때 사람의 감정과 분위기를 많이 고려한다.", axis: "FT" },
      { text: "계획표나 체크리스트가 있으면 마음이 편하다.", axis: "JP" },
      { text: "상황에 따라 유연하게 바꾸는 것이 더 편하다.", axis: "PJ" },
      { text: "처음 만난 사람과도 대화를 비교적 쉽게 시작한다.", axis: "EI" },
      { text: "낯선 모임에서는 관찰을 먼저 하는 편이다.", axis: "IE" },
      { text: "설명은 구체적인 예시가 있어야 이해가 잘 된다.", axis: "SN" },
      { text: "새로운 상상이나 연결되는 아이디어가 자주 떠오른다.", axis: "NS" },
      { text: "문제 상황에서 원인과 해결책을 빠르게 찾으려 한다.", axis: "TF" },
      { text: "상대방이 어떤 마음일지 먼저 생각하는 편이다.", axis: "FT" },
      { text: "마감 전에 미리 끝내야 마음이 놓인다.", axis: "JP" },
      { text: "마감이 가까워질수록 집중력이 올라오는 편이다.", axis: "PJ" },
      { text: "말하면서 생각이 정리되는 편이다.", axis: "EI" },
      { text: "혼자 생각한 뒤 말하는 편이 더 자연스럽다.", axis: "IE" },
      { text: "정해진 방식보다 더 나은 방법을 찾고 싶어 한다.", axis: "NS" },
      { text: "정리된 규칙과 안정적인 루틴을 선호한다.", axis: "JP" }
    ];

    const typeDescriptions = {
      ISTJ: "책임감 있고 현실적인 관리자형입니다. 약속과 기준을 중요하게 여기며 안정적인 실행력이 강합니다.",
      ISFJ: "따뜻하고 성실한 보호자형입니다. 주변 사람을 세심하게 챙기고 조용히 책임을 다하는 편입니다.",
      INFJ: "깊은 통찰과 이상을 가진 조언자형입니다. 사람의 마음과 의미를 깊게 바라보는 편입니다.",
      INTJ: "전략적이고 독립적인 설계자형입니다. 큰 그림을 보고 장기적인 계획을 세우는 데 강합니다.",
      ISTP: "분석적이고 독립적인 해결사형입니다. 말보다 행동으로 문제를 파악하고 실용적으로 해결하는 편입니다.",
      ISFP: "감각적이고 온화한 예술가형입니다. 자유로운 분위기에서 자기만의 감성을 표현합니다.",
      INFP: "가치와 진정성을 중시하는 중재자형입니다. 내면의 기준이 분명하고 따뜻한 상상력이 있습니다.",
      INTP: "논리와 탐구를 좋아하는 사색가형입니다. 궁금한 것을 깊게 파고들며 독창적인 사고를 합니다.",
      ESTP: "활동적이고 현실적인 모험가형입니다. 순간 판단과 실행력이 좋고 에너지가 넘칩니다.",
      ESFP: "밝고 생동감 있는 분위기 메이커형입니다. 사람들과 즐거운 경험을 나누는 것을 좋아합니다.",
      ENFP: "열정적이고 창의적인 아이디어형입니다. 가능성을 발견하고 사람에게 긍정적인 에너지를 줍니다.",
      ENTP: "재치 있고 도전적인 토론가형입니다. 새로운 관점과 실험적인 시도를 즐깁니다.",
      ESTJ: "체계적이고 추진력 있는 관리자형입니다. 목표와 효율을 중요하게 여기며 실행력이 좋습니다.",
      ESFJ: "사교적이고 배려심 깊은 조력자형입니다. 관계와 분위기를 잘 살피며 책임감이 강합니다.",
      ENFJ: "사람을 이끄는 따뜻한 리더형입니다. 타인의 가능성을 발견하고 함께 성장하는 것을 좋아합니다.",
      ENTJ: "목표 지향적인 지휘관형입니다. 빠른 판단과 강한 추진력으로 큰 계획을 실행합니다."
    };

    const typeIcons = {
      ISTJ: "fa-solid fa-clipboard-check",
      ISFJ: "fa-solid fa-hand-holding-heart",
      INFJ: "fa-solid fa-seedling",
      INTJ: "fa-solid fa-chess-knight",
      ISTP: "fa-solid fa-screwdriver-wrench",
      ISFP: "fa-solid fa-palette",
      INFP: "fa-solid fa-cloud-moon",
      INTP: "fa-solid fa-microscope",
      ESTP: "fa-solid fa-bolt",
      ESFP: "fa-solid fa-star",
      ENFP: "fa-solid fa-wand-magic-sparkles",
      ENTP: "fa-solid fa-lightbulb",
      ESTJ: "fa-solid fa-briefcase",
      ESFJ: "fa-solid fa-people-group",
      ENFJ: "fa-solid fa-heart",
      ENTJ: "fa-solid fa-crown"
    };

    const labels = ["전혀 아니다", "아니다", "보통", "그렇다", "매우 그렇다"];

    let currentPage = 0;
    let answers = new Array(questions.length).fill(3);

    const questionBox = document.getElementById("questionBox");
    const pageText = document.getElementById("pageText");
    const percentText = document.getElementById("percentText");
    const progressBar = document.getElementById("progressBar");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const testArea = document.getElementById("testArea");
    const resultArea = document.getElementById("resultArea");
    const resultType = document.getElementById("resultType");
    const resultDesc = document.getElementById("resultDesc");
    const resultIcon = document.getElementById("resultIcon");
    const restartBtn = document.getElementById("restartBtn");

    function renderQuestions() {
      questionBox.innerHTML = "";

      const start = currentPage * 2;
      const end = start + 2;

      questions.slice(start, end).forEach((question, index) => {
        const realIndex = start + index;
        const card = document.createElement("div");
        card.className = "question-card";

        card.innerHTML = `
          <h2>${realIndex + 1}. ${question.text}</h2>
          <div class="scale">
            ${labels.map((label, valueIndex) => {
              const value = valueIndex + 1;
              return `
                <label>
                  <input
                    type="radio"
                    name="q${realIndex}"
                    value="${value}"
                    ${answers[realIndex] === value ? "checked" : ""}
                  />
                  <span>${label}</span>
                </label>
              `;
            }).join("")}
          </div>
        `;

        card.querySelectorAll("input").forEach(input => {
          input.addEventListener("change", () => {
            answers[realIndex] = Number(input.value);
          });
        });

        questionBox.appendChild(card);
      });

      const totalPage = Math.ceil(questions.length / 2);
      const percent = Math.round(((currentPage + 1) / totalPage) * 100);

      pageText.textContent = `${currentPage + 1} / ${totalPage}`;
      percentText.textContent = `${percent}%`;
      progressBar.style.width = `${percent}%`;

      prevBtn.style.visibility = currentPage === 0 ? "hidden" : "visible";
      nextBtn.textContent = currentPage === totalPage - 1 ? "결과 보기" : "다음";
    }

    function calculateResult() {
      const score = {
        E: 0, I: 0,
        S: 0, N: 0,
        T: 0, F: 0,
        J: 0, P: 0
      };

      questions.forEach((question, index) => {
        const value = answers[index];
        const first = question.axis[0];
        const second = question.axis[1];

        score[first] += value;
        score[second] += 6 - value;
      });

      const type =
        (score.E >= score.I ? "E" : "I") +
        (score.S >= score.N ? "S" : "N") +
        (score.T >= score.F ? "T" : "F") +
        (score.J >= score.P ? "J" : "P");

      showResult(type);
    }

    function showResult(type) {
      testArea.style.display = "none";
      resultArea.style.display = "block";

      resultType.textContent = type;
      resultDesc.textContent = typeDescriptions[type];
      resultIcon.innerHTML = `<i class="${typeIcons[type]}"></i>`;
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) {
        currentPage--;
        renderQuestions();
      }
    });

    nextBtn.addEventListener("click", () => {
      const totalPage = Math.ceil(questions.length / 2);

      if (currentPage < totalPage - 1) {
        currentPage++;
        renderQuestions();
      } else {
        calculateResult();
      }
    });

    restartBtn.addEventListener("click", () => {
      currentPage = 0;
      answers = new Array(questions.length).fill(3);

      resultArea.style.display = "none";
      testArea.style.display = "block";

      renderQuestions();
    });

    renderQuestions();
  </script>
</body>
</html>
